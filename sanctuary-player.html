<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanctuary — Learn the Parts</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{--cream:#f4e7d4;--terra:#d2684f;--terra-dark:#b04c35;--ink:#2a1f14;--ink-soft:#5a4535;--rule:rgba(210,104,79,0.2);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--ink);font-family:'Jost',sans-serif;font-size:15px;line-height:1.7;}
.player{max-width:720px;margin:0 auto;padding:40px 24px 60px;}
.player-title{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-soft);opacity:0.5;margin-bottom:6px;}
.player-name{font-size:28px;font-weight:300;color:var(--ink);margin-bottom:24px;}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.voice-btns{display:flex;gap:7px;flex-wrap:wrap;}
.voice-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;border:1.5px solid;background:none;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;font-weight:500;}
.voice-btn.muted{opacity:0.3;}
.view-toggle{display:flex;border:1px solid var(--rule);border-radius:100px;overflow:hidden;}
.view-btn{padding:6px 14px;border:none;background:none;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-soft);cursor:pointer;transition:all 0.2s;}
.view-btn.active{background:var(--terra);color:var(--cream);}

/* Piano roll */
.roll-wrap{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--rule);margin-bottom:4px;background:#f0e6d3;}
canvas#rollCanvas{display:block;width:100%;height:120px;}

/* Score view */
#scoreWrap{display:none;position:relative;overflow:hidden;border-radius:10px;border:1px solid var(--rule);height:280px;background:#faf5ed;cursor:pointer;}
#scoreImg0,#scoreImg1{position:absolute;display:none;user-select:none;pointer-events:none;}
#playheadLine{position:absolute;top:0;bottom:0;width:2px;background:var(--terra);pointer-events:none;z-index:3;}
#playheadGlow{position:absolute;top:0;bottom:0;pointer-events:none;z-index:2;background:linear-gradient(to right,rgba(210,104,79,0),rgba(210,104,79,0.1));}
#pastShade{position:absolute;top:0;left:0;bottom:0;background:rgba(42,31,20,0.07);pointer-events:none;z-index:2;}
#scoreLoadMsg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-soft);opacity:0.45;z-index:4;}

.time-bar{display:flex;justify-content:space-between;font-size:10px;letter-spacing:0.08em;color:var(--ink-soft);opacity:0.45;margin-bottom:18px;padding:0 2px;}
.lyrics-strip{margin-bottom:22px;display:flex;flex-direction:column;gap:5px;min-height:72px;}
.lyric-row{display:flex;align-items:baseline;gap:12px;}
.lyric-voice{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;width:64px;flex-shrink:0;font-weight:500;opacity:0.7;}
.lyric-text{font-size:18px;font-weight:300;font-style:italic;transition:all 0.15s;opacity:0.5;}
.lyric-text.active{font-weight:400;font-style:normal;opacity:1;}
.transport{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.play-btn{width:44px;height:44px;border-radius:50%;background:var(--terra);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;flex-shrink:0;}
.play-btn:hover{background:var(--terra-dark);}
.play-btn svg{width:16px;height:16px;fill:var(--cream);margin-left:2px;}
.play-btn.playing svg{margin-left:0;}
.loop-btn{padding:7px 13px;border-radius:100px;border:1.5px solid var(--rule);background:none;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-soft);cursor:pointer;transition:all 0.2s;}
.loop-btn.on{border-color:var(--terra);color:var(--terra);background:rgba(210,104,79,0.06);}
.tempo-group{display:flex;align-items:center;gap:9px;flex:1;min-width:150px;}
.tempo-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-soft);opacity:0.6;white-space:nowrap;}
input[type=range]{flex:1;accent-color:var(--terra);cursor:pointer;}
.tempo-val{font-size:12px;font-weight:500;color:var(--terra);min-width:28px;text-align:right;}
.hint{font-size:11px;color:var(--ink-soft);opacity:0.4;margin-top:18px;}
</style>
</head>
<body>
<div class="player">
  <p class="player-title">Learn the parts</p>
  <h2 class="player-name">Sanctuary</h2>

  <div class="top-row">
    <div class="voice-btns" id="voiceBtns"></div>
    <div class="view-toggle">
      <button class="view-btn active" id="btnRoll" onclick="setView('roll')">Piano roll</button>
      <button class="view-btn" id="btnScore" onclick="setView('score')">Score</button>
    </div>
  </div>

  <!-- Piano roll -->
  <div class="roll-wrap" id="rollWrap">
    <canvas id="rollCanvas"></canvas>
  </div>

  <!-- Score view: img-based, no canvas taint issues -->
  <div id="scoreWrap" onclick="scoreClick(event)">
    <div id="scoreLoadMsg">Loading score…</div>
    <img id="scoreImg0" alt="">
    <img id="scoreImg1" alt="">
    <div id="pastShade"></div>
    <div id="playheadGlow"></div>
    <div id="playheadLine"></div>
  </div>

  <div class="time-bar">
    <span id="timeCurrent">0:00</span>
    <span id="timeTotal">1:33</span>
  </div>
  <div class="lyrics-strip" id="lyricsStrip"></div>

  <div class="transport">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">
      <svg id="playIcon" viewBox="0 0 16 16"><polygon points="3,1 15,8 3,15"/></svg>
    </button>
    <button class="loop-btn on" id="loopBtn" onclick="toggleLoop()">Loop</button>
    <div class="tempo-group">
      <span class="tempo-label">Speed</span>
      <input type="range" id="tempoRange" min="50" max="150" value="100" step="5" oninput="setTempo(this.value)">
      <span class="tempo-val" id="tempoVal">1×</span>
    </div>
  </div>
  <p class="hint">Click the score or roll to jump to any position. Toggle voices to hear individual parts.</p>
</div>

function fmtTime(s){s=Math.max(0,Math.min(TOTAL_DUR,s));return Math.floor(s/60)+':'+(Math.floor(s%60)).toString().padStart(2,'0');}
function midiFreq(m){return 440*Math.pow(2,(m-69)/12);}
function songNow(){if(!isPlaying)return pauseAt;return pauseAt+(audioCtx.currentTime-audioStart)*tempoScale;}
function songToAudio(t){return audioStart+(t-pauseAt)/tempoScale;}

function tToX(t,sys){
  const bars=sys.xb,n=bars.length-1;
  const mi=Math.max(0,Math.min(n,(t-sys.ts)/(sys.te-sys.ts)*n));
  const m=Math.min(n-1,Math.floor(mi));
  return bars[m]+(mi-m)*(bars[m+1]-bars[m]);
}
function sysForTime(t){
  for(const s of SYSTEMS) if(t>=s.ts&&t<=s.te) return s;
  return SYSTEMS[SYSTEMS.length-1];
}
function xToT(svgX,sys){
  const bars=sys.xb,n=bars.length-1;
  const dur=sys.te-sys.ts;
  for(let i=0;i<n;i++){
    if(svgX>=bars[i]&&svgX<=bars[i+1]){
      const frac=(svgX-bars[i])/(bars[i+1]-bars[i]);
      return sys.ts+(i+frac)*dur/n;
    }
  }
  return svgX<bars[0]?sys.ts:sys.te;
}

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const master=audioCtx.createGain();master.gain.value=0.55;master.connect(audioCtx.destination);
  gainNodes=VOICES.map(()=>{const g=audioCtx.createGain();g.gain.value=1;g.connect(master);return g;});
}

function schedNote(midi,startT,durT,ti){
  const freq=midiFreq(midi),env=audioCtx.createGain();env.connect(gainNodes[ti]);
  [1,2,3].forEach((h,i)=>{
    const osc=audioCtx.createOscillator(),hg=audioCtx.createGain();
    hg.gain.value=[0.5,0.12,0.04][i];osc.type='sine';osc.frequency.value=freq*h;
    if(i>0)osc.detune.value=(Math.random()-0.5)*4;
    osc.connect(hg);hg.connect(env);osc.start(startT);osc.stop(startT+durT+0.05);
  });
  const atk=Math.min(0.04,durT*0.15),rel=Math.min(0.12,durT*0.25);
  env.gain.setValueAtTime(0,startT);
  env.gain.linearRampToValueAtTime(0.38,startT+atk);
  env.gain.setValueAtTime(0.38,startT+durT-rel);
  env.gain.linearRampToValueAtTime(0,startT+durT);
}

function runScheduler(){
  if(!isPlaying||!audioCtx)return;
  const la=audioCtx.currentTime+0.25,now=songNow();
  if(now>=TOTAL_DUR){looping?seekTo(0):stopPlayback();return;}
  MIDI_DATA.tracks.forEach((track,ti)=>{
    while(nextIdx[ti]<track.notes.length){
      const note=track.notes[nextIdx[ti]],at=songToAudio(note.start);
      if(at>la)break;
      if(at>=audioCtx.currentTime-0.01&&!muted[ti])schedNote(note.midi,at,note.dur/tempoScale,ti);
      nextIdx[ti]++;
    }
  });
}

function seekTo(t){
  pauseAt=Math.max(0,Math.min(TOTAL_DUR,t));
  if(isPlaying){audioStart=audioCtx.currentTime;nextIdx=MIDI_DATA.tracks.map(tr=>Math.max(0,tr.notes.findIndex(n=>n.start>=pauseAt-0.05)));}
}

function startPlayback(){
  initAudio();if(audioCtx.state==='suspended')audioCtx.resume();
  audioStart=audioCtx.currentTime;
  nextIdx=MIDI_DATA.tracks.map(tr=>Math.max(0,tr.notes.findIndex(n=>n.start>=pauseAt-0.05)));
  isPlaying=true;schedTimer=setInterval(runScheduler,80);
  animReq=requestAnimationFrame(drawLoop);updatePlayBtn();
}

function stopPlayback(){pauseAt=songNow();isPlaying=false;clearInterval(schedTimer);cancelAnimationFrame(animReq);updatePlayBtn();}

    track.notes.forEach(note=>{
      const xS=playX+(note.start-now)*PPS,xE=xS+note.dur*PPS;
      if(xE<0||xS>W)return;
      const y=(MIDI_MAX-note.midi)*rowH;
      c.globalAlpha=note.start+note.dur<now?0.22:1.0;c.fillStyle=v.color;
      const x=Math.max(0,xS),w=Math.min(W,xE)-x;
      c.beginPath();
      if(c.roundRect)c.roundRect(x,y+0.5,Math.max(w,1.5),rowH-1,Math.min(rowH*0.45,2));
      else c.rect(x,y+0.5,Math.max(w,1.5),rowH-1);
      c.fill();
    });
    c.globalAlpha=1;
  });
  c.fillStyle='rgba(42,31,20,0.08)';c.fillRect(0,0,playX,H);
  c.strokeStyle='rgba(42,31,20,0.5)';c.lineWidth=1.5;
  c.beginPath();c.moveTo(playX,0);c.lineTo(playX,H);c.stroke();
}

function updateScore(now){
  const sys=sysForTime(now);
  const wrap=document.getElementById('scoreWrap');
  const W=wrap.offsetWidth;
  const xHead=W*PLAYHEAD_FRAC;

  // Show correct page image
  imgEls[0].style.display=sys.p===0?'block':'none';
  imgEls[1].style.display=sys.p===1?'block':'none';
  const img=imgEls[sys.p];

  // Fallback: browser may have loaded from cache before onload was set
  if(!imgsLoaded[sys.p] && img.complete && img.naturalWidth>0) imgsLoaded[sys.p]=true;

  const sysH=sys.yb-sys.yt+PAD*2;
  const scale=SCORE_H/sysH;
  const xNote=tToX(now,sys);
  const imgLeft=xHead-xNote*scale;
  const imgTop=-(sys.yt-PAD)*scale;

  img.style.width=(SVG_W*scale)+'px';
  img.style.left=imgLeft+'px';
  img.style.top=imgTop+'px';

  document.getElementById('playheadLine').style.left=xHead+'px';
  document.getElementById('playheadGlow').style.left=(xHead-24)+'px';
  document.getElementById('playheadGlow').style.width='28px';
  document.getElementById('pastShade').style.width=xHead+'px';
  updateScoreMsg();
}

function scoreClick(e){
  const wrap=document.getElementById('scoreWrap');
  const rect=wrap.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const now=songNow(),sys=sysForTime(now);
  const W=wrap.offsetWidth,xHead=W*PLAYHEAD_FRAC;
  const sysH=sys.yb-sys.yt+PAD*2,scale=SCORE_H/sysH;
  const xNote=tToX(now,sys);
  const clickedSvgX=xNote+(x-xHead)/scale;
  seekTo(xToT(clickedSvgX,sys));
  if(!isPlaying)requestAnimationFrame(drawLoop);
}

document.getElementById('rollCanvas').addEventListener('click',e=>{
  const canvas=e.currentTarget;
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const W=canvas.offsetWidth,PPS=W/10,playX=W*PLAYHEAD_FRAC;
  seekTo(songNow()+(x-playX)/PPS);
  if(!isPlaying)requestAnimationFrame(drawLoop);
});

function getCurrentLyric(notes,t){
  let best=null;
  for(const n of notes){if(!n.lyric)continue;if(n.start<=t&&n.start+n.dur+0.3>t)best=n.lyric.trim();}
  return best;
}

function drawLoop(){
  const now=songNow();
  if(currentView==='roll') drawRoll(now);
  else updateScore(now);
  MIDI_DATA.tracks.forEach((track,ti)=>{
    const lyric=getCurrentLyric(track.notes,now);
    const el=document.getElementById('lyric-'+ti);
    if(el){el.textContent=lyric||'—';el.classList.toggle('active',!!lyric);}
  });
  document.getElementById('timeCurrent').textContent=fmtTime(now);
  animReq=requestAnimationFrame(drawLoop);
}

// Build voice buttons and lyric rows
const vb=document.getElementById('voiceBtns');
const ls=document.getElementById('lyricsStrip');
VOICES.forEach((v,i)=>{
  const btn=document.createElement('button');
  btn.className='voice-btn';
  btn.style.cssText='border-color:'+v.color+';color:'+v.text;
  btn.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:'+v.color+';display:inline-block;flex-shrink:0"></span>'+v.name;
  btn.onclick=()=>{muted[i]=!muted[i];if(gainNodes[i])gainNodes[i].gain.value=muted[i]?0:1;btn.classList.toggle('muted',muted[i]);};
  vb.appendChild(btn);
  const row=document.createElement('div');row.className='lyric-row';
  row.innerHTML='<span class="lyric-voice" style="color:'+v.color+'">'+v.name+'</span>'+'<span class="lyric-text" id="lyric-'+i+'" style="color:'+v.text+'">—</span>';
  ls.appendChild(row);
});

requestAnimationFrame(drawLoop);
</script>
